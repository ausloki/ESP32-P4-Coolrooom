##############################################################################
# ESP32-P4 Coolroom Controller
# Board: Waveshare ESP32-P4-WIFI6-Touch-LCD-7B
# https://docs.waveshare.com/ESP32-P4-WIFI6-Touch-LCD-7B
#
# CODING PRINCIPLE: C++/ESP-IDF first.
#   Complex logic lives in p4_helpers.h as proper C++ functions.
#   YAML lambdas are one-liners that call those helpers.
#   YAML is configuration; C++ is the firmware.
#
# HARDWARE-FIRST RULE
# All pin assignments must be verified against the board schematic before
# flashing. Pins marked ⚠️ VERIFY are unconfirmed estimates.
# Schematic: https://files.waveshare.com/wiki/ESP32-P4-WIFI6-Touch-LCD-7B/
#
# TEMPERATURE SENSOR ARCHITECTURE
# All temperature probes are RS485 RTD (Waveshare BRT-PT100AD or equivalent).
# There are NO I2C temperature sensors. I2C is reserved for the onboard RTC
# (chip identity ⚠️ VERIFY FROM SCHEMATIC — likely PCF8563 or DS3231).
#
# PROBE MAP
#   Probe 1 (coolroom primary)  — RTD board 1, CH1, addr 100
#   Probe 2 (evaporator/defrost)— RTD board 1, CH2, addr 100
#   Probe 3 (ambient reference) — RTD board 2, CH1, addr 101
#
# RELAY MAP (Waveshare Modbus RTU Relay 4-CH, addr 1)
#   Coil 0 = Defrost   Coil 1 = Compressor
#   Coil 2 = Light     Coil 3 = Siren
#
# PHASE STATUS
#   Phase 1: WiFi, HA native API, web server, OTA            ✓
#   Phase 2: RS485 Modbus — relays + 3x RTD probes           ✓
#   Phase 3: Coolroom control logic                          ✓
#   Phase 4: LVGL 7" MIPI-DSI touchscreen UI                ✓
#   Phase 5: SD card logging, ntfy, backup/restore           ← CURRENT
##############################################################################

substitutions:
  device_name:   esp32-p4-coolroom
  friendly_name: "Coolroom Controller P4"
  timezone:      Australia/Perth

  # ── NTP servers ───────────────────────────────────────────────────────────
  ntp_server_1: au.pool.ntp.org
  ntp_server_2: time.google.com

  # ── NTP sync intervals (milliseconds, passed to ESP-IDF esp_sntp_set_sync_interval)
  # ntp_fast_sync_ms  : poll rate at boot until first sync (1 minute)
  # ntp_normal_sync_ms: steady-state interval (86400000 = 24 h)
  ntp_fast_sync_ms:   "60000"
  ntp_normal_sync_ms: "86400000"

  # ── I2C header (GPIO CONFIRMED from Waveshare docs) ───────────────────────
  # Reserved for onboard RTC only. NOT used for temperature.
  i2c_sda_pin: GPIO7
  i2c_scl_pin: GPIO8

  # ── RS485 UART (✅ CONFIRMED from Waveshare 13_RS485_Test example) ────────
  rs485_tx_pin: GPIO27
  rs485_rx_pin: GPIO26

  # ── Relay board ───────────────────────────────────────────────────────────
  modbus_relay_address: "1"

  # ── RTD board 1: Coolroom (CH1) + Evaporator (CH2), addr 100 ─────────────
  modbus_rtd1_address:          "100"
  modbus_rtd_universal_address: "249"
  rtd_temp_reg_ch1:             "1"
  rtd_temp_reg_ch2:             "2"
  rtd_temp_scale:               "0.1"

  # ── RTD board 2: Ambient (CH1 only), addr 101 ─────────────────────────────
  # ⚠️  Set this address on the physical device before deployment.
  modbus_rtd2_address: "101"
  rtd2_temp_reg_ch1:   "1"

  # ── WiFi co-processor (ESP32-C6 via SDIO) ─────────────────────────────────
  # ✅ CONFIRMED from Waveshare esp32_p4_function_ev_board.h (CONFIG_BSP_BOARD_TYPE_FIB)
  wifi_sdio_clk_pin: GPIO18
  wifi_sdio_cmd_pin: GPIO19
  wifi_sdio_d0_pin:  GPIO14
  wifi_sdio_d1_pin:  GPIO15
  wifi_sdio_d2_pin:  GPIO16
  wifi_sdio_d3_pin:  GPIO17
  wifi_c6_reset_pin: GPIO54
  wifi_c6_wakeup_pin: GPIO6

  # ── Phase 4: Display & Touch GPIO (✅ confirmed from board schematic PDF) ─
  # INT_TP  → NLGPIO23, RESET_TP → NLGPIO33, BL_CTRL → NLGPIO32
  touch_int_pin:  GPIO23
  touch_rst_pin:  GPIO33   # shared with LCD reset — ESPHome model handles LCD side
  display_bl_pin: GPIO32

  # ── Control defaults ──────────────────────────────────────────────────────
  default_setpoint_c:   "2.0"
  default_comp_diff_c:  "1.0"
  default_alarm_high_c: "3.0"
  default_alarm_low_c:  "3.0"

  # ── Phase 6: Extended control parameter defaults ──────────────────────────
  default_comp_lockout_min:    "3"    # compressor off-delay (minutes)
  default_startup_grace_min:   "15"   # no alarms for N min after boot
  default_defrost_grace_min:   "20"   # no alarms for N min after defrost
  default_alarm_persist_min:   "5"    # alarm must hold N min before siren
  default_alarm_hysteresis_c:  "0.5"  # temp band to clear alarm (°C)
  default_no_cool_alarm_min:   "60"   # no-cool alarm after N min compressor run
  default_door_alarm_delay_s:  "30"   # door open alarm delay (seconds)
  default_defrost_interval_min: "480"  # defrost every N min (8h)
  default_defrost_duration_min: "30"   # max defrost on-time (min)
  default_defrost_drip_min:    "5"    # drip time after defrost (min)
  default_defrost_end_c:       "5.0"  # evap temp to terminate defrost (°C)
  default_ice_delta_c:         "2.0"  # coolroom-evap min delta; below = ice alarm
  default_fallback_on_min:     "3"    # sensor fallback compressor on-time (min)
  default_fallback_off_min:    "27"   # sensor fallback compressor off-time (min)
  default_smart_delta_c:       "8.0"  # delta threshold for smart defrost trigger
  default_smart_dwell_min:     "30"   # delta must hold N min before smart defrost
  # ── Phase 3: Defrost scheduling & probe health ────────────────────
  defrost_interval_h:  "8"      # hours between defrost cycles
  defrost_max_min:     "30"     # maximum defrost duration (minutes)
  probe_stale_ms:      "30000"  # probe 1 declared stale after this many ms

  # ── Phase 5: SD logging & ntfy ──────────────────────────────
  log_interval_min:    "5"      # temperature log interval (minutes)
  ntfy_server:         "https://ntfy.sh"   # ntfy server URL
  ntfy_topic:          "coolroom-alerts"   # ntfy topic name
  ntfy_priority:       "high"              # default ntfy message priority

##############################################################################
# Platform
##############################################################################

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - p4_helpers.h
    - p4_control.h
    - p4_logging.h
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            id(ctl_boot_ms) = millis();
            p4_log_boot();
            p4_ntp_set_fast_sync(${ntp_fast_sync_ms});
    - priority: -200
      then:
        - lambda: |-
            // Phase 5: mount SD card after all peripherals are up
            if (p4_sd_mount()) {
                id(sd_card_ok) = true;
                // Attempt param restore only if NVS is at defaults
                float sp = id(ctl_setpoint);
                float cd = id(ctl_comp_diff);
                float ah = id(ctl_alarm_high_delta);
                float al = id(ctl_alarm_low_delta);
                if (p4_sd_restore_params(sp, cd, ah, al)) {
                    id(ctl_setpoint)         = sp;
                    id(ctl_comp_diff)        = cd;
                    id(ctl_alarm_high_delta) = ah;
                    id(ctl_alarm_low_delta)  = al;
                    ESP_LOGI("sd", "Control params restored from SD backup");
                    p4_sd_log_event("BOOT_RESTORE", "params loaded from SD");
                } else {
                    p4_sd_log_event("BOOT", "SD mounted, no restore needed");
                }
            } else {
                id(sd_card_ok) = false;
                ESP_LOGW("sd", "SD card not found or mount failed");
            }
    - priority: -100
      then:
        - lambda: id(status_text).publish_state("Booting...");

esp32:
  variant: esp32p4
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_LWIP_TCP_SND_BUF_DEFAULT: "65535"
      CONFIG_LWIP_TCP_WND_DEFAULT: "65535"
      CONFIG_LWIP_TCP_RECVMBOX_SIZE: "16"
      # Phase 5: FATFS for SD card (long filename support)
      CONFIG_FATFS_LFN_HEAP: "y"
      CONFIG_FATFS_MAX_LFN: "255"
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true
  flash_size: 32MB
  partitions: partitions_custom.csv
  cpu_frequency: 360MHz

psram:
  mode: hex

##############################################################################
# WiFi via ESP32-C6 co-processor (ESP-Hosted SDIO)
# ✅ SDIO PINS CONFIRMED from Waveshare esp32_p4_function_ev_board.h (FIB variant)
##############################################################################

esp32_hosted:
  type: sdio
  variant: ESP32C6
  reset_pin: ${wifi_c6_reset_pin}
  active_high: true
  clk_pin: ${wifi_sdio_clk_pin}
  cmd_pin: ${wifi_sdio_cmd_pin}
  d0_pin:  ${wifi_sdio_d0_pin}
  d1_pin:  ${wifi_sdio_d1_pin}
  d2_pin:  ${wifi_sdio_d2_pin}
  d3_pin:  ${wifi_sdio_d3_pin}
  bus_width: 4
  sdio_frequency: 10MHz
  use_psram: true

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 10
  ap:
    ssid: "CoolroomP4-Setup"
    password: !secret ap_password
  on_connect:
    - lambda: |-
        id(ctl_wifi_connected) = true;
        ESP_LOGI("wifi", "WiFi connected");
  on_disconnect:
    - lambda: id(ctl_wifi_connected) = false;

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s
  on_client_connected:
    - lambda: |-
        ESP_LOGI("ha", "HA client connected: %s", client_info.c_str());

ota:
  - platform: esphome
    password: !secret ota_password

mdns:
  disabled: false

##############################################################################
# Time — SNTP with configurable sync intervals via ESP-IDF API
# The P4 board has a battery-backed RTC holder (item 11).
# RTC chip identity ⚠️ VERIFY FROM SCHEMATIC (likely PCF8563 or DS3231).
# Fast-sync at boot is set by p4_ntp_set_fast_sync() in on_boot above.
# Normal interval is restored by p4_ntp_set_interval() in on_time_sync below.
##############################################################################

time:
  - platform: sntp
    id: ntp_time
    timezone: ${timezone}
    servers:
      - ${ntp_server_1}
      - ${ntp_server_2}
    on_time_sync:
      - lambda: |-
          ESP_LOGI("ntp", "Sync complete — switching to normal interval");
          p4_ntp_set_interval(${ntp_normal_sync_ms});

  # PCF8563 external RTC (battery-backed, synced from NTP via ESP32 internal RTC)
  # ⚠️ RTC CHIP: PCF8563 assumed from Waveshare convention. See reference/RTC_PCF8563_Configuration.md.
  #    Verify from board schematic PDF if I2C scan does not show 0x51.
  - platform: pcf8563
    id: rtc_pcf8563
    i2c_id: i2c_bus
    address: 0x51                        # PCF8563 fixed I2C address
    update_interval: 60s
    on_time_sync:
      - lambda: |-
          ESP_LOGI("rtc", "PCF8563 synced from NTP");
          id(hw_rtc_ok) = true;

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG
  logs:
    modbus_controller: WARN
    modbus: WARN
    sensor: WARN
    text_sensor: WARN

safe_mode:
  boot_is_good_after: 60s
  num_attempts: 3

web_server:
  port: 80
  version: 3
  auth:
    username: !secret web_server_username
    password: !secret web_server_password
  sorting_groups:
    - id: group_system_info
      name: "System"
      sorting_weight: -200
    - id: group_network
      name: "Network & Connectivity"
      sorting_weight: -190
    - id: group_control
      name: "Temperature Control"
      sorting_weight: -100
    - id: group_compressor
      name: "Compressor"
      sorting_weight: -80
    - id: group_defrost
      name: "Defrost"
      sorting_weight: -60
    - id: group_probes
      name: "Probes & Sensors"
      sorting_weight: -40
    - id: group_door
      name: "Door"
      sorting_weight: -30
    - id: group_alarms
      name: "Alarms"
      sorting_weight: -20
    - id: group_diagnostics
      name: "Diagnostics"
      sorting_weight: 100

##############################################################################
# I2C — Reserved for onboard RTC (NOT for temperature sensors)
##############################################################################

i2c:
  - id: i2c_bus
    sda: ${i2c_sda_pin}
    scl: ${i2c_scl_pin}
    scan: true
    frequency: 100kHz

##############################################################################
# RS485 / Modbus
# ✅ UART PINS CONFIRMED from Waveshare 13_RS485_Test example (GPIO 27 TX / 26 RX)
##############################################################################

uart:
  - id: rs485_uart
    tx_pin: ${rs485_tx_pin}
    rx_pin: ${rs485_rx_pin}
    baud_rate: 9600
    stop_bits: 1
    data_bits: 8
    parity: NONE

modbus:
  - id: rs485_modbus
    uart_id: rs485_uart
    send_wait_time: 250ms

modbus_controller:
  - id: relay_board
    address: ${modbus_relay_address}
    modbus_id: rs485_modbus
    setup_priority: -10
    update_interval: 5s
    on_online:
      - lambda: |-
          id(hw_rs485_relay_ok) = true;
          ESP_LOGI("rs485", "Relay board ONLINE");
    on_offline:
      - lambda: |-
          id(hw_rs485_relay_ok) = false;
          ESP_LOGW("rs485", "Relay board OFFLINE");

  - id: rtd_board_1
    address: ${modbus_rtd1_address}
    modbus_id: rs485_modbus
    setup_priority: -10
    update_interval: 2s
    on_online:
      - lambda: |-
          id(hw_rs485_rtd1_ok) = true;
          ESP_LOGI("rs485", "RTD board 1 ONLINE");
    on_offline:
      - lambda: |-
          id(hw_rs485_rtd1_ok) = false;
          ESP_LOGW("rs485", "RTD board 1 OFFLINE");

  - id: rtd_board_2
    address: ${modbus_rtd2_address}
    modbus_id: rs485_modbus
    setup_priority: -10
    update_interval: 10s
    on_online:
      - lambda: |-
          id(hw_rs485_rtd2_ok) = true;
          ESP_LOGI("rs485", "RTD board 2 (ambient) ONLINE");
    on_offline:
      - lambda: |-
          id(hw_rs485_rtd2_ok) = false;
          ESP_LOGW("rs485", "RTD board 2 (ambient) OFFLINE");

##############################################################################
# Relay Switches — coils 0-3 on relay_board
##############################################################################

switch:
  - platform: modbus_controller
    modbus_controller_id: relay_board
    id: relay_defrost
    name: "Defrost Relay"
    icon: "mdi:snowflake-melt"
    web_server:
      sorting_group_id: group_defrost
      sorting_weight: 2
    register_type: coil
    address: 0
    restore_mode: ALWAYS_OFF
    write_lambda: |-
      if (x) id(relay_compressor).turn_off();
      return x;
    on_turn_on:
      - lambda: ESP_LOGI("relay", "Defrost ON");
      - lvgl.led.update:
          id: led_defrost
          brightness: 100%
    on_turn_off:
      - lambda: ESP_LOGI("relay", "Defrost OFF");
      - lvgl.led.update:
          id: led_defrost
          brightness: 0%

  - platform: modbus_controller
    modbus_controller_id: relay_board
    id: relay_compressor
    name: "Compressor Relay"
    icon: "mdi:hvac"
    web_server:
      sorting_group_id: group_compressor
      sorting_weight: 1
    register_type: coil
    address: 1
    restore_mode: ALWAYS_OFF
    write_lambda: |-
      if (x) id(relay_defrost).turn_off();
      return x;
    on_turn_on:
      - lambda: ESP_LOGI("relay", "Compressor ON");
      - lvgl.led.update:
          id: led_compressor
          brightness: 100%
    on_turn_off:
      - lambda: ESP_LOGI("relay", "Compressor OFF");
      - lvgl.led.update:
          id: led_compressor
          brightness: 0%

  - platform: modbus_controller
    modbus_controller_id: relay_board
    id: relay_light
    name: "Light Relay"
    icon: "mdi:lightbulb"
    web_server:
      sorting_group_id: group_door
      sorting_weight: 5
    register_type: coil
    address: 2
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: ESP_LOGI("relay", "Light ON");
    on_turn_off:
      - lambda: ESP_LOGI("relay", "Light OFF");

  - platform: modbus_controller
    modbus_controller_id: relay_board
    id: relay_siren
    name: "Siren Relay"
    icon: "mdi:alarm-bell"
    web_server:
      sorting_group_id: group_alarms
      sorting_weight: 5
    register_type: coil
    address: 3
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: ESP_LOGI("relay", "Siren ON");
    on_turn_off:
      - lambda: ESP_LOGI("relay", "Siren OFF");

##############################################################################
# Sensors — all temperature probes are RS485 RTD
##############################################################################

sensor:
  # ── System diagnostics ────────────────────────────────────────────────────
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: wifi_rssi
    update_interval: 60s
    web_server:
      sorting_group_id: group_network
      sorting_weight: 1

  - platform: internal_temperature
    name: "Chip Temperature"
    id: chip_temp
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 10

  - platform: template
    name: "Free Heap (KB)"
    id: free_heap_kb
    lambda: 'return p4_free_heap_kb();'
    unit_of_measurement: "KB"
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 11

  - platform: template
    name: "Free PSRAM (KB)"
    id: free_psram_kb
    lambda: 'return p4_free_psram_kb();'
    unit_of_measurement: "KB"
    update_interval: 60s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 12

  - platform: uptime
    name: "System Uptime"
    id: system_uptime
    update_interval: 60s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 2

  # ── RTD board 1 raw (internal — timestamps updated in filter lambda) ───────
  - platform: modbus_controller
    modbus_controller_id: rtd_board_1
    id: rtd1_ch1_raw
    internal: true
    register_type: holding
    address: ${rtd_temp_reg_ch1}
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (!isnan(x)) id(rtd1_ch1_last_ms) = millis();
          return x * ${rtd_temp_scale};

  - platform: modbus_controller
    modbus_controller_id: rtd_board_1
    id: rtd1_ch2_raw
    internal: true
    register_type: holding
    address: ${rtd_temp_reg_ch2}
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (!isnan(x)) id(rtd1_ch2_last_ms) = millis();
          return x * ${rtd_temp_scale};

  # ── RTD board 2 raw (internal — ambient) ──────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: rtd_board_2
    id: rtd2_ch1_raw
    internal: true
    register_type: holding
    address: ${rtd2_temp_reg_ch1}
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (!isnan(x)) id(rtd2_ch1_last_ms) = millis();
          return x * ${rtd_temp_scale};

  # ── Published probe sensors ────────────────────────────────────────────────
  - platform: template
    id: probe1_temp
    name: "Coolroom Temperature (Primary Control)"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    state_class: measurement
    device_class: temperature
    update_interval: 2s
    web_server:
      sorting_group_id: group_probes
      sorting_weight: 1
    lambda: 'return p4_rtd_or_nan(id(rtd1_ch1_raw).state);'
    on_value:
      - lvgl.label.update:
          id: lbl_coolroom_temp
          text: !lambda 'return p4_fmt_temp(x, false);'
      - if:
          condition:
            lambda: 'return p4_rtd_valid(x) && x > id(ctl_setpoint) + id(ctl_alarm_high_delta);'
          then:
            - lvgl.label.update:
                id: lbl_coolroom_temp
                text_color: col_red
          else:
            - if:
                condition:
                  lambda: 'return p4_rtd_valid(x) && x < id(ctl_setpoint) - id(ctl_alarm_low_delta);'
                then:
                  - lvgl.label.update:
                      id: lbl_coolroom_temp
                      text_color: col_blue
                else:
                  - lvgl.label.update:
                      id: lbl_coolroom_temp
                      text_color: col_green

  - platform: template
    id: probe2_temp
    name: "Evaporator Temperature (Secondary Control)"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    state_class: measurement
    device_class: temperature
    update_interval: 2s
    web_server:
      sorting_group_id: group_probes
      sorting_weight: 2
    lambda: |-
      if (!id(input_probe2_enabled)) return NAN;
      return p4_rtd_or_nan(id(rtd1_ch2_raw).state);
    on_value:
      - lvgl.label.update:
          id: lbl_evap_temp
          text: !lambda 'return p4_fmt_temp(x, false);'

  - platform: template
    id: probe3_temp
    name: "Ambient Temperature (External Reference)"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    state_class: measurement
    device_class: temperature
    update_interval: 10s
    web_server:
      sorting_group_id: group_probes
      sorting_weight: 3
    lambda: |-
      if (!id(input_probe3_enabled)) return NAN;
      return p4_rtd_or_nan(id(rtd2_ch1_raw).state);
    on_value:
      - lvgl.label.update:
          id: lbl_ambient_temp
          text: !lambda 'return p4_fmt_temp(x, false);'

  # ── Probe staleness diagnostics ────────────────────────────────────────────
  - platform: template
    name: "RTD1 CH1 Sample Age (s)"
    id: rtd1_ch1_age_s
    unit_of_measurement: "s"
    update_interval: 5s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 20
    lambda: 'return p4_sample_age_s(id(rtd1_ch1_last_ms));'

  - platform: template
    name: "RTD1 CH2 Sample Age (s)"
    id: rtd1_ch2_age_s
    unit_of_measurement: "s"
    update_interval: 5s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 21
    lambda: 'return p4_sample_age_s(id(rtd1_ch2_last_ms));'

  - platform: template
    name: "RTD2 Ambient Sample Age (s)"
    id: rtd2_ch1_age_s
