      sorting_weight: 11

##############################################################################
# Phase 3: 10-second control loop
# All decision logic lives in p4_control.h. This lambda is the orchestrator.
##############################################################################

interval:
  - interval: 10s
    then:
      - lambda: |-
          // ── 1. Probe health ─────────────────────────────────────────────
          float t = id(probe1_temp).state;
          bool fault = p4_ctl_probe_fault(t, id(rtd1_ch1_last_ms), ${probe_stale_ms});
          id(ctl_probe_fault) = fault;
          if (fault) {
              // Safety: cut all actuators when primary probe is faulted
              id(relay_compressor).turn_off();
              id(relay_defrost).turn_off();
              id(relay_siren).turn_on();
              return;
          }

          // ── 2. Compressor hysteresis control ────────────────────────────
          // (skip if defrost relay is active — mutual exclusion via write_lambda too)
          if (!id(relay_defrost).state) {
              int cmd = p4_ctl_compressor_eval(
                  t,
                  id(ctl_setpoint), id(ctl_comp_diff),
                  id(relay_compressor).state,
                  id(rtd1_ch1_last_ms), ${probe_stale_ms}
              );
              if (cmd == 1)  id(relay_compressor).turn_on();
              if (cmd == -1) id(relay_compressor).turn_off();
          }

          // ── 3. Alarm evaluation ─────────────────────────────────────────
          bool hi = p4_ctl_alarm_high(t, id(ctl_setpoint), id(ctl_alarm_high_delta));
          bool lo = p4_ctl_alarm_low(t, id(ctl_setpoint), id(ctl_alarm_low_delta));
          id(ctl_alarm_high_active) = hi;
          id(ctl_alarm_low_active)  = lo;
          if (hi || lo) {
              if (!id(relay_siren).state) {
                  ESP_LOGW("ctl", "ALARM: hi=%d lo=%d t=%.1f°C sp=%.1f°C",
                           (int)hi, (int)lo, t, id(ctl_setpoint));
                  id(relay_siren).turn_on();
              }
          } else {
              if (id(relay_siren).state) id(relay_siren).turn_off();
          }

          // ── 4. Defrost scheduling ───────────────────────────────────────
          const uint32_t def_interval_ms = (uint32_t)(${defrost_interval_h}) * 3600000U;
          const uint32_t def_max_ms      = (uint32_t)(${defrost_max_min})    * 60000U;
          if (!id(relay_defrost).state) {
              if (p4_ctl_defrost_due(id(ctl_defrost_last_end_ms), def_interval_ms)) {
                  ESP_LOGI("ctl", "Starting defrost cycle");
                  id(relay_compressor).turn_off();
                  id(relay_defrost).turn_on();
                  id(ctl_defrost_on_since_ms) = millis();
              }
          } else {
              if (p4_ctl_defrost_timeout(id(ctl_defrost_on_since_ms), def_max_ms)) {
                  ESP_LOGI("ctl", "Defrost complete (timeout %u min)", (unsigned)${defrost_max_min});
                  id(relay_defrost).turn_off();
                  id(ctl_defrost_last_end_ms) = millis();
              }
          }

  # ── Phase 4: 1s LVGL display updates ─────────────────────────────────────
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            char buf[24];
            p4_fmt_time(buf, sizeof(buf));
            std::string s(buf);
            return s.size() > 8 ? s.substr(s.size()-8) : s;
      - lvgl.label.update:
          id: lbl_heap
          text: !lambda |-
            char buf[24];
            snprintf(buf, sizeof(buf), "Heap: %.0f KB", p4_free_heap_kb());
            return std::string(buf);
      - lvgl.led.update:
          id: led_rs485
          brightness: !lambda 'return (id(hw_rs485_relay_ok) && id(hw_rs485_rtd1_ok)) ? 100.0f : 0.0f;'
      - lvgl.led.update:
          id: led_rtc
          brightness: !lambda 'return id(hw_rtc_ok) ? 100.0f : 0.0f;'

##############################################################################
# Globals
##############################################################################

globals:
  # ── Control parameters (NVS-persistent) ───────────────────────────────────
  - id: ctl_setpoint
    type: float
    restore_value: yes
    initial_value: ${default_setpoint_c}

  - id: ctl_comp_diff
    type: float
    restore_value: yes
    initial_value: ${default_comp_diff_c}

  - id: ctl_alarm_high_delta
    type: float
    restore_value: yes
    initial_value: ${default_alarm_high_c}

  - id: ctl_alarm_low_delta
    type: float
    restore_value: yes
    initial_value: ${default_alarm_low_c}

  # ── Runtime state ─────────────────────────────────────────────────────────
  - id: ctl_boot_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_wifi_connected
    type: bool
    restore_value: no
    initial_value: "false"

  # ── RS485 health flags ─────────────────────────────────────────────────────
  - id: hw_rs485_relay_ok
    type: bool
    restore_value: no
    initial_value: "false"

  - id: hw_rs485_rtd1_ok
    type: bool
    restore_value: no
    initial_value: "false"

  - id: hw_rs485_rtd2_ok
    type: bool
    restore_value: no
    initial_value: "false"

  # ── RTC health flag ────────────────────────────────────────────────────────
  - id: hw_rtc_ok
    type: bool
    restore_value: no
    initial_value: "false"

  # ── RTD sample timestamps (millis() at last valid reading) ─────────────────
  - id: rtd1_ch1_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: rtd1_ch2_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: rtd2_ch1_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  # ── Probe enable flags (NVS-persistent) ───────────────────────────────────
  - id: input_probe2_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: input_probe3_enabled
    type: bool
    restore_value: yes
    initial_value: "true"
  # ── Phase 3: Control state ────────────────────────────────────────
  - id: ctl_probe_fault
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_alarm_high_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_alarm_low_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_defrost_on_since_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_defrost_last_end_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

##############################################################################
# Phase 4: LDO — MIPI-DSI D-PHY power rail
# Channel 3 at 2.5V is the standard ESP32-P4 MIPI-DSI configuration.
# Confirmed: ESP_LDO_VO3 net present in board schematic.
##############################################################################

esp_ldo:
  - id: ldo_mipi_dphy
    channel: 3
    voltage: 2.5V

##############################################################################
# Phase 4: MIPI-DSI Display — 7" 1024×600 JD9365, 2-lane DSI
# Model matches exactly. Reset pin GPIO33 confirmed from schematic.
##############################################################################

display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    update_interval: never
    auto_clear_enabled: false
    on_page_change:
      - lambda: 'ESP_LOGD("lvgl", "display page changed");'

##############################################################################
# Phase 4: GT911 Capacitive Touchscreen
# Shares i2c_bus (GPIO 7/8). INT GPIO23, RST GPIO33 from schematic.
##############################################################################

touchscreen:
  - platform: gt911
    id: touch_panel
    i2c_id: i2c_bus
    address: 0x5D
    interrupt_pin:
      number: ${touch_int_pin}
      mode:
        input: true
    # reset_pin omitted: GPIO33 is owned by the mipi_dsi model (shared LCD+touch reset line)

##############################################################################
# Phase 4: Backlight output
##############################################################################

output:
  - platform: ledc
    id: backlight_pwm
    pin: ${display_bl_pin}
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 500ms
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 20

##############################################################################
# Phase 4: Fonts for LVGL
##############################################################################

font:
  - file: "gfonts://Roboto"
    id: font_huge
    size: 64
    glyphs: "0123456789.-+NA "
  - file: "gfonts://Roboto"
    id: font_large
    size: 28
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-: /%"
  - file: "gfonts://Roboto"
    id: font_medium
    size: 20
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-: /%+"
  - file: "gfonts://Roboto"
    id: font_small
    size: 15
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-: /%+"

