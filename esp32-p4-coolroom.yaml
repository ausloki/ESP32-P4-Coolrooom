          if (id(relay_defrost).state) id(relay_defrost).turn_off();
          if (id(relay_compressor).state) id(relay_compressor).turn_off();
          id(ctl_manual_defrost_req) = false;
          id(ctl_defrost_dripping) = false;
          id(ctl_defrost_last_end_ms) = millis();
          ESP_LOGI("ctl", "Manual defrost stopped via button");
          p4_sd_log_event("DEFROST_MANUAL_STOP", "button");
