##############################################################################
# ESP32-P4 Coolroom Controller
# Board: Waveshare ESP32-P4-WIFI6-Touch-LCD-7B
# https://docs.waveshare.com/ESP32-P4-WIFI6-Touch-LCD-7B
#
# CODING PRINCIPLE: C++/ESP-IDF first.
#   Complex logic lives in p4_helpers.h as proper C++ functions.
#   YAML lambdas are one-liners that call those helpers.
#   YAML is configuration; C++ is the firmware.
#
# HARDWARE-FIRST RULE
# All pin assignments must be verified against the board schematic before
# flashing. Pins marked ⚠️ VERIFY are unconfirmed estimates.
# Schematic: https://files.waveshare.com/wiki/ESP32-P4-WIFI6-Touch-LCD-7B/
#
# TEMPERATURE SENSOR ARCHITECTURE
# All temperature probes are RS485 RTD (Waveshare BRT-PT100AD or equivalent).
# There are NO I2C temperature sensors. I2C is reserved for the onboard RTC
# (chip identity ⚠️ VERIFY FROM SCHEMATIC — likely PCF8563 or DS3231).
#
# PROBE MAP
#   Probe 1 (coolroom primary)  — RTD board 1, CH1, addr 100
#   Probe 2 (evaporator/defrost)— RTD board 1, CH2, addr 100
#   Probe 3 (ambient reference) — RTD board 2, CH1, addr 101
#
# RELAY MAP (Waveshare Modbus RTU Relay 4-CH, addr 1)
#   Coil 0 = Defrost   Coil 1 = Compressor
#   Coil 2 = Light     Coil 3 = Siren
#
# PHASE STATUS
#   Phase 1: WiFi, HA native API, web server, OTA            ✓
#   Phase 2: RS485 Modbus — relays + 3x RTD probes           ← CURRENT
#   Phase 3: Coolroom control logic
#   Phase 4: LVGL 7" MIPI-DSI touchscreen UI
#   Phase 5: SD card logging, ntfy, backup/restore
##############################################################################

substitutions:
  device_name:   esp32-p4-coolroom
  friendly_name: "Coolroom Controller P4"
  timezone:      Australia/Perth

  # ── NTP servers ───────────────────────────────────────────────────────────
  ntp_server_1: au.pool.ntp.org
  ntp_server_2: time.google.com

  # ── NTP sync intervals (milliseconds, passed to ESP-IDF esp_sntp_set_sync_interval)
  # ntp_fast_sync_ms  : poll rate at boot until first sync (1 minute)
  # ntp_normal_sync_ms: steady-state interval (86400000 = 24 h)
  ntp_fast_sync_ms:   "60000"
  ntp_normal_sync_ms: "86400000"

  # ── I2C header (GPIO CONFIRMED from Waveshare docs) ───────────────────────
  # Reserved for onboard RTC only. NOT used for temperature.
  i2c_sda_pin: GPIO7
  i2c_scl_pin: GPIO8

  # ── RS485 UART (⚠️  VERIFY FROM SCHEMATIC — GPIO35/36 are estimates) ──────
  rs485_tx_pin: GPIO35
  rs485_rx_pin: GPIO36

  # ── Relay board ───────────────────────────────────────────────────────────
  modbus_relay_address: "1"

  # ── RTD board 1: Coolroom (CH1) + Evaporator (CH2), addr 100 ─────────────
  modbus_rtd1_address:          "100"
  modbus_rtd_universal_address: "249"
  rtd_temp_reg_ch1:             "1"
  rtd_temp_reg_ch2:             "2"
  rtd_temp_scale:               "0.1"

  # ── RTD board 2: Ambient (CH1 only), addr 101 ─────────────────────────────
  # ⚠️  Set this address on the physical device before deployment.
  modbus_rtd2_address: "101"
  rtd2_temp_reg_ch1:   "1"

  # ── WiFi co-processor (ESP32-C6 via SDIO) ─────────────────────────────────
  # ⚠️  VERIFY ALL PINS FROM SCHEMATIC
  wifi_sdio_clk_pin: GPIO25
  wifi_sdio_cmd_pin: GPIO26
  wifi_sdio_d0_pin:  GPIO27
  wifi_sdio_d1_pin:  GPIO28
  wifi_sdio_d2_pin:  GPIO29
  wifi_sdio_d3_pin:  GPIO30
  wifi_c6_reset_pin: GPIO54

  # ── Control defaults ──────────────────────────────────────────────────────
  default_setpoint_c:   "2.0"
  default_comp_diff_c:  "1.0"
  default_alarm_high_c: "3.0"
  default_alarm_low_c:  "3.0"

##############################################################################
# Platform
##############################################################################

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - p4_helpers.h
  on_boot:
    - priority: 600
      then:
        - lambda: |-
            id(ctl_boot_ms) = millis();
            p4_log_boot();
            p4_ntp_set_fast_sync(${ntp_fast_sync_ms});
    - priority: -100
      then:
        - lambda: id(status_text).publish_state("Booting...");

esp32:
  variant: esp32p4
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_LWIP_TCP_SND_BUF_DEFAULT: "65535"
      CONFIG_LWIP_TCP_WND_DEFAULT: "65535"
      CONFIG_LWIP_TCP_RECVMBOX_SIZE: "16"
    advanced:
      execute_from_psram: true
      enable_idf_experimental_features: true
  flash_size: 32MB
  partitions: partitions_custom.csv
  cpu_frequency: 360MHz

psram:
  mode: hex

##############################################################################
# WiFi via ESP32-C6 co-processor (ESP-Hosted SDIO)
# ⚠️  SDIO PINS UNCONFIRMED — verify from schematic before first WiFi use
##############################################################################

esp32_hosted:
  type: sdio
  variant: ESP32C6
  reset_pin: ${wifi_c6_reset_pin}
  active_high: true
  clk_pin: ${wifi_sdio_clk_pin}
  cmd_pin: ${wifi_sdio_cmd_pin}
  d0_pin:  ${wifi_sdio_d0_pin}
  d1_pin:  ${wifi_sdio_d1_pin}
  d2_pin:  ${wifi_sdio_d2_pin}
  d3_pin:  ${wifi_sdio_d3_pin}
  bus_width: 4
  sdio_frequency: 10MHz
  use_psram: true

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 10
  ap:
    ssid: "CoolroomP4-Setup"
    password: !secret ap_password
  on_connect:
    - lambda: |-
        id(ctl_wifi_connected) = true;
        ESP_LOGI("wifi", "WiFi connected");
  on_disconnect:
    - lambda: id(ctl_wifi_connected) = false;

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s
  on_client_connected:
    - lambda: |-
        ESP_LOGI("ha", "HA client connected: %s", client_info.c_str());

ota:
  - platform: esphome
    password: !secret ota_password

mdns:
  disabled: false

##############################################################################
# Time — SNTP with configurable sync intervals via ESP-IDF API
# The P4 board has a battery-backed RTC holder (item 11).
# RTC chip identity ⚠️ VERIFY FROM SCHEMATIC (likely PCF8563 or DS3231).
# Fast-sync at boot is set by p4_ntp_set_fast_sync() in on_boot above.
# Normal interval is restored by p4_ntp_set_interval() in on_time_sync below.
##############################################################################

time:
  - platform: sntp
    id: ntp_time
    timezone: ${timezone}
    servers:
      - ${ntp_server_1}
      - ${ntp_server_2}
    on_time_sync:
      - lambda: |-
          ESP_LOGI("ntp", "Sync complete — switching to normal interval");
          p4_ntp_set_interval(${ntp_normal_sync_ms});

logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG
  logs:
    modbus_controller: WARN
    modbus: WARN
    sensor: WARN
    text_sensor: WARN

safe_mode:
  boot_is_good_after: 60s
  num_attempts: 3

web_server:
  port: 80
  version: 3
  auth:
    username: !secret web_server_username
    password: !secret web_server_password
  sorting_groups:
    - id: group_system_info
      name: "System"
      sorting_weight: -200
    - id: group_network
      name: "Network & Connectivity"
      sorting_weight: -190
    - id: group_control
      name: "Temperature Control"
      sorting_weight: -100
    - id: group_compressor
      name: "Compressor"
      sorting_weight: -80
    - id: group_defrost
      name: "Defrost"
      sorting_weight: -60
    - id: group_probes
      name: "Probes & Sensors"
      sorting_weight: -40
    - id: group_door
      name: "Door"
      sorting_weight: -30
    - id: group_alarms
      name: "Alarms"
      sorting_weight: -20
    - id: group_diagnostics
      name: "Diagnostics"
      sorting_weight: 100

##############################################################################
# I2C — Reserved for onboard RTC (NOT for temperature sensors)
##############################################################################

i2c:
  - id: i2c_bus
    sda: ${i2c_sda_pin}
    scl: ${i2c_scl_pin}
    scan: true
    frequency: 100kHz

##############################################################################
# RS485 / Modbus
# ⚠️  UART PINS UNCONFIRMED — verify rs485_tx_pin/rx_pin from schematic
##############################################################################

uart:
  - id: rs485_uart
    tx_pin: ${rs485_tx_pin}
    rx_pin: ${rs485_rx_pin}
    baud_rate: 9600
    stop_bits: 1
    data_bits: 8
    parity: NONE

modbus:
  - id: rs485_modbus
    uart_id: rs485_uart
    send_wait_time: 250ms

modbus_controller:
  - id: relay_board
    address: ${modbus_relay_address}
    modbus_id: rs485_modbus
    setup_priority: -10
    update_interval: 5s
    on_online:
      - lambda: |-
          id(hw_rs485_relay_ok) = true;
          ESP_LOGI("rs485", "Relay board ONLINE");
    on_offline:
      - lambda: |-
          id(hw_rs485_relay_ok) = false;
          ESP_LOGW("rs485", "Relay board OFFLINE");

  - id: rtd_board_1
    address: ${modbus_rtd1_address}
    modbus_id: rs485_modbus
    setup_priority: -10
    update_interval: 2s
    on_online:
      - lambda: |-
          id(hw_rs485_rtd1_ok) = true;
          ESP_LOGI("rs485", "RTD board 1 ONLINE");
    on_offline:
      - lambda: |-
          id(hw_rs485_rtd1_ok) = false;
          ESP_LOGW("rs485", "RTD board 1 OFFLINE");

  - id: rtd_board_2
    address: ${modbus_rtd2_address}
    modbus_id: rs485_modbus
    setup_priority: -10
    update_interval: 10s
    on_online:
      - lambda: |-
          id(hw_rs485_rtd2_ok) = true;
          ESP_LOGI("rs485", "RTD board 2 (ambient) ONLINE");
    on_offline:
      - lambda: |-
          id(hw_rs485_rtd2_ok) = false;
          ESP_LOGW("rs485", "RTD board 2 (ambient) OFFLINE");

##############################################################################
# Relay Switches — coils 0-3 on relay_board
##############################################################################

switch:
  - platform: modbus_controller
    modbus_controller_id: relay_board
    id: relay_defrost
    name: "Defrost Relay"
    icon: "mdi:snowflake-melt"
    web_server:
      sorting_group_id: group_defrost
      sorting_weight: 2
    register_type: coil
    address: 0
    restore_mode: ALWAYS_OFF
    write_lambda: |-
      if (x) id(relay_compressor).turn_off();
      return x;
    on_turn_on:
      - lambda: ESP_LOGI("relay", "Defrost ON");
    on_turn_off:
      - lambda: ESP_LOGI("relay", "Defrost OFF");

  - platform: modbus_controller
    modbus_controller_id: relay_board
    id: relay_compressor
    name: "Compressor Relay"
    icon: "mdi:hvac"
    web_server:
      sorting_group_id: group_compressor
      sorting_weight: 1
    register_type: coil
    address: 1
    restore_mode: ALWAYS_OFF
    write_lambda: |-
      if (x) id(relay_defrost).turn_off();
      return x;
    on_turn_on:
      - lambda: ESP_LOGI("relay", "Compressor ON");
    on_turn_off:
      - lambda: ESP_LOGI("relay", "Compressor OFF");

  - platform: modbus_controller
    modbus_controller_id: relay_board
    id: relay_light
    name: "Light Relay"
    icon: "mdi:lightbulb"
    web_server:
      sorting_group_id: group_door
      sorting_weight: 5
    register_type: coil
    address: 2
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: ESP_LOGI("relay", "Light ON");
    on_turn_off:
      - lambda: ESP_LOGI("relay", "Light OFF");

  - platform: modbus_controller
    modbus_controller_id: relay_board
    id: relay_siren
    name: "Siren Relay"
    icon: "mdi:alarm-bell"
    web_server:
      sorting_group_id: group_alarms
      sorting_weight: 5
    register_type: coil
    address: 3
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - lambda: ESP_LOGI("relay", "Siren ON");
    on_turn_off:
      - lambda: ESP_LOGI("relay", "Siren OFF");

##############################################################################
# Sensors — all temperature probes are RS485 RTD
##############################################################################

sensor:
  # ── System diagnostics ────────────────────────────────────────────────────
  - platform: wifi_signal
    name: "WiFi Signal Strength"
    id: wifi_rssi
    update_interval: 60s
    web_server:
      sorting_group_id: group_network
      sorting_weight: 1

  - platform: internal_temperature
    name: "Chip Temperature"
    id: chip_temp
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 10

  - platform: template
    name: "Free Heap (KB)"
    id: free_heap_kb
    lambda: 'return p4_free_heap_kb();'
    unit_of_measurement: "KB"
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 11

  - platform: template
    name: "Free PSRAM (KB)"
    id: free_psram_kb
    lambda: 'return p4_free_psram_kb();'
    unit_of_measurement: "KB"
    update_interval: 60s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 12

  - platform: uptime
    name: "System Uptime"
    id: system_uptime
    update_interval: 60s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 2

  # ── RTD board 1 raw (internal — timestamps updated in filter lambda) ───────
  - platform: modbus_controller
    modbus_controller_id: rtd_board_1
    id: rtd1_ch1_raw
    internal: true
    register_type: holding
    address: ${rtd_temp_reg_ch1}
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (!isnan(x)) id(rtd1_ch1_last_ms) = millis();
          return x * ${rtd_temp_scale};

  - platform: modbus_controller
    modbus_controller_id: rtd_board_1
    id: rtd1_ch2_raw
    internal: true
    register_type: holding
    address: ${rtd_temp_reg_ch2}
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (!isnan(x)) id(rtd1_ch2_last_ms) = millis();
          return x * ${rtd_temp_scale};

  # ── RTD board 2 raw (internal — ambient) ──────────────────────────────────
  - platform: modbus_controller
    modbus_controller_id: rtd_board_2
    id: rtd2_ch1_raw
    internal: true
    register_type: holding
    address: ${rtd2_temp_reg_ch1}
    value_type: S_WORD
    accuracy_decimals: 1
    filters:
      - lambda: |-
          if (!isnan(x)) id(rtd2_ch1_last_ms) = millis();
          return x * ${rtd_temp_scale};

  # ── Published probe sensors ────────────────────────────────────────────────
  - platform: template
    id: probe1_temp
    name: "Coolroom Temperature (Primary Control)"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    state_class: measurement
    device_class: temperature
    update_interval: 2s
    web_server:
      sorting_group_id: group_probes
      sorting_weight: 1
    lambda: 'return p4_rtd_or_nan(id(rtd1_ch1_raw).state);'

  - platform: template
    id: probe2_temp
    name: "Evaporator Temperature (Secondary Control)"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    state_class: measurement
    device_class: temperature
    update_interval: 2s
    web_server:
      sorting_group_id: group_probes
      sorting_weight: 2
    lambda: |-
      if (!id(input_probe2_enabled)) return NAN;
      return p4_rtd_or_nan(id(rtd1_ch2_raw).state);

  - platform: template
    id: probe3_temp
    name: "Ambient Temperature (External Reference)"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    state_class: measurement
    device_class: temperature
    update_interval: 10s
    web_server:
      sorting_group_id: group_probes
      sorting_weight: 3
    lambda: |-
      if (!id(input_probe3_enabled)) return NAN;
      return p4_rtd_or_nan(id(rtd2_ch1_raw).state);

  # ── Probe staleness diagnostics ────────────────────────────────────────────
  - platform: template
    name: "RTD1 CH1 Sample Age (s)"
    id: rtd1_ch1_age_s
    unit_of_measurement: "s"
    update_interval: 5s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 20
    lambda: 'return p4_sample_age_s(id(rtd1_ch1_last_ms));'

  - platform: template
    name: "RTD1 CH2 Sample Age (s)"
    id: rtd1_ch2_age_s
    unit_of_measurement: "s"
    update_interval: 5s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 21
    lambda: 'return p4_sample_age_s(id(rtd1_ch2_last_ms));'

  - platform: template
    name: "RTD2 Ambient Sample Age (s)"
    id: rtd2_ch1_age_s
    unit_of_measurement: "s"
    update_interval: 15s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 22
    lambda: 'return p4_sample_age_s(id(rtd2_ch1_last_ms));'

##############################################################################
# Text Sensors
##############################################################################

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: ip_address
      web_server:
        sorting_group_id: group_network
        sorting_weight: 2
    ssid:
      name: "WiFi SSID"
      id: wifi_ssid_text
      web_server:
        sorting_group_id: group_network
        sorting_weight: 3
    mac_address:
      name: "MAC Address"
      id: mac_address
      web_server:
        sorting_group_id: group_network
        sorting_weight: 4

  - platform: version
    name: "ESPHome Version"
    id: esphome_version
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 1

  - platform: template
    name: "Status"
    id: status_text
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 3

  - platform: template
    name: "Current Time"
    id: current_time
    update_interval: 10s
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 4
    lambda: |-
      char buf[24];
      p4_fmt_time(buf, sizeof(buf));
      return std::string{buf};

  - platform: template
    name: "NTP Sync Status"
    id: ntp_sync_status
    update_interval: 30s
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 5
    lambda: 'return std::string{p4_ntp_synced() ? "SYNCED" : "PENDING"};'

##############################################################################
# Binary Sensors
##############################################################################

binary_sensor:
  - platform: status
    name: "Controller Online"
    id: controller_online
    web_server:
      sorting_group_id: group_network
      sorting_weight: 1

  - platform: template
    id: rs485_relay_online
    name: "RS485 Relay Board Online"
    device_class: connectivity
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 30
    lambda: 'return id(hw_rs485_relay_ok);'

  - platform: template
    id: rs485_rtd1_online
    name: "RS485 RTD Board 1 Online"
    device_class: connectivity
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 31
    lambda: 'return id(hw_rs485_rtd1_ok);'

  - platform: template
    id: rs485_rtd2_online
    name: "RS485 RTD Board 2 (Ambient) Online"
    device_class: connectivity
    web_server:
      sorting_group_id: group_diagnostics
      sorting_weight: 32
    lambda: 'return id(hw_rs485_rtd2_ok);'

##############################################################################
# Number Entities — NVS-persistent control parameters
##############################################################################

number:
  - platform: template
    id: setpoint
    name: "Setpoint (°C)"
    icon: "mdi:thermometer"
    unit_of_measurement: "°C"
    min_value: -30
    max_value: 15
    step: 0.5
    web_server:
      sorting_group_id: group_control
      sorting_weight: 1
    lambda: 'return id(ctl_setpoint);'
    set_action:
      - lambda: |-
          id(ctl_setpoint) = x;
          if (esphome::global_preferences != nullptr)
            esphome::global_preferences->sync();

  - platform: template
    id: compressor_differential
    name: "Compressor Differential (°C)"
    icon: "mdi:thermometer-chevron-up"
    unit_of_measurement: "°C"
    min_value: 0.5
    max_value: 10.0
    step: 0.5
    web_server:
      sorting_group_id: group_compressor
      sorting_weight: 2
    lambda: 'return id(ctl_comp_diff);'
    set_action:
      - lambda: |-
          id(ctl_comp_diff) = x;
          if (esphome::global_preferences != nullptr)
            esphome::global_preferences->sync();

  - platform: template
    id: alarm_high_delta
    name: "High Temp Alarm Delta (°C)"
    icon: "mdi:thermometer-alert"
    unit_of_measurement: "°C"
    min_value: 0.5
    max_value: 20.0
    step: 0.5
    web_server:
      sorting_group_id: group_alarms
      sorting_weight: 1
    lambda: 'return id(ctl_alarm_high_delta);'
    set_action:
      - lambda: |-
          id(ctl_alarm_high_delta) = x;
          if (esphome::global_preferences != nullptr)
            esphome::global_preferences->sync();

  - platform: template
    id: alarm_low_delta
    name: "Low Temp Alarm Delta (°C)"
    icon: "mdi:thermometer-minus"
    unit_of_measurement: "°C"
    min_value: 0.5
    max_value: 20.0
    step: 0.5
    web_server:
      sorting_group_id: group_alarms
      sorting_weight: 2
    lambda: 'return id(ctl_alarm_low_delta);'
    set_action:
      - lambda: |-
          id(ctl_alarm_low_delta) = x;
          if (esphome::global_preferences != nullptr)
            esphome::global_preferences->sync();

##############################################################################
# Buttons
##############################################################################

button:
  - platform: restart
    id: restart_btn
    name: "Restart Controller"
    icon: "mdi:restart"
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 10

  - platform: factory_reset
    id: factory_reset_btn
    name: "Factory Reset"
    icon: "mdi:restore"
    entity_category: config
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 11

##############################################################################
# Globals
##############################################################################

globals:
  # ── Control parameters (NVS-persistent) ───────────────────────────────────
  - id: ctl_setpoint
    type: float
    restore_value: yes
    initial_value: ${default_setpoint_c}

  - id: ctl_comp_diff
    type: float
    restore_value: yes
    initial_value: ${default_comp_diff_c}

  - id: ctl_alarm_high_delta
    type: float
    restore_value: yes
    initial_value: ${default_alarm_high_c}

  - id: ctl_alarm_low_delta
    type: float
    restore_value: yes
    initial_value: ${default_alarm_low_c}

  # ── Runtime state ─────────────────────────────────────────────────────────
  - id: ctl_boot_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_wifi_connected
    type: bool
    restore_value: no
    initial_value: "false"

  # ── RS485 health flags ─────────────────────────────────────────────────────
  - id: hw_rs485_relay_ok
    type: bool
    restore_value: no
    initial_value: "false"

  - id: hw_rs485_rtd1_ok
    type: bool
    restore_value: no
    initial_value: "false"

  - id: hw_rs485_rtd2_ok
    type: bool
    restore_value: no
    initial_value: "false"

  # ── RTD sample timestamps (millis() at last valid reading) ─────────────────
  - id: rtd1_ch1_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: rtd1_ch2_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: rtd2_ch1_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  # ── Probe enable flags (NVS-persistent) ───────────────────────────────────
  - id: input_probe2_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: input_probe3_enabled
    type: bool
    restore_value: yes
    initial_value: "true"
