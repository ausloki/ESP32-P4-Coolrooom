##############################################################################
# Phase 4: LVGL update automations — merged into interval: above
##############################################################################

##############################################################################
# Phase 5: ntfy notification scripts (triggered from 10s control loop)
# Uses ESPHome http_request component. Each script sends one POST to ntfy.
##############################################################################

script:
  - id: ntfy_high_alarm_request
    then:
      - http_request.post:
          url: !lambda |-
            return std::string("${ntfy_server}/${ntfy_topic}");
          request_headers:
            Title: "Coolroom HIGH TEMP Alarm"
            Priority: "${ntfy_priority}"
            Tags: "thermometer,rotating_light"
          body: !lambda |-
            char buf[80];
            snprintf(buf, sizeof(buf), "Coolroom %.1f°C — setpoint %.1f°C",
                     id(probe1_temp).state, id(ctl_setpoint));
            return std::string(buf);

  - id: ntfy_low_alarm_request
    then:
      - http_request.post:
          url: !lambda |-
            return std::string("${ntfy_server}/${ntfy_topic}");
          request_headers:
            Title: "Coolroom LOW TEMP Alarm"
            Priority: "${ntfy_priority}"
            Tags: "snowflake,rotating_light"
          body: !lambda |-
            char buf[80];
            snprintf(buf, sizeof(buf), "Coolroom %.1f°C — setpoint %.1f°C",
                     id(probe1_temp).state, id(ctl_setpoint));
            return std::string(buf);

  - id: ntfy_alarm_clear_request
    then:
      - http_request.post:
          url: !lambda |-
            return std::string("${ntfy_server}/${ntfy_topic}");
          request_headers:
            Title: "Coolroom Alarm CLEARED"
            Priority: "low"
            Tags: "white_check_mark"
          body: !lambda |-
            char buf[60];
            snprintf(buf, sizeof(buf), "Temperature normal: %.1f°C", id(probe1_temp).state);
            return std::string(buf);

  - id: ntfy_probe_fault_request
    then:
      - http_request.post:
          url: !lambda |-
            return std::string("${ntfy_server}/${ntfy_topic}");
          request_headers:
            Title: "Coolroom PROBE FAULT"
            Priority: "urgent"
            Tags: "warning,thermometer"
          body: "Probe 1 stale or invalid — check RS485 connection."