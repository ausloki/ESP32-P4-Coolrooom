          bool ok = p4_sd_backup_params(
              id(ctl_setpoint), id(ctl_comp_diff),
              id(ctl_alarm_high_delta), id(ctl_alarm_low_delta));
          ESP_LOGI("sd", "Backup %s", ok ? "OK" : "FAILED");
          if (ok) p4_sd_log_event("BACKUP", "manual");

  - platform: template
    id: btn_sd_restore
