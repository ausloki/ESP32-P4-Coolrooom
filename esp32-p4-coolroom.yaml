    icon: "mdi:restore"
    entity_category: config
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 21
    on_press:
      - lambda: |-
          float sp = id(ctl_setpoint);
          float cd = id(ctl_comp_diff);
          float ah = id(ctl_alarm_high_delta);
          float al = id(ctl_alarm_low_delta);
          if (p4_sd_restore_params(sp, cd, ah, al)) {
              id(ctl_setpoint)         = sp;
              id(ctl_comp_diff)        = cd;
              id(ctl_alarm_high_delta) = ah;
              id(ctl_alarm_low_delta)  = al;
              if (esphome::global_preferences != nullptr)
                  esphome::global_preferences->sync();
              p4_sd_log_event("RESTORE", "manual");
          }

##############################################################################
# Phase 5: HTTP request component for ntfy push notifications
##############################################################################

http_request:
  verify_ssl: false
  timeout: 10s

##############################################################################
# Phase 3: 10-second control loop
# All decision logic lives in p4_control.h. This lambda is the orchestrator.
##############################################################################

interval:
  - interval: 10s
    then:
      - lambda: |-
          const uint32_t now_ms = millis();
          float t    = id(probe1_temp).state;
          float evap = id(probe2_temp).state;
          bool evap_ok = p4_rtd_valid(evap) && p4_sample_fresh(id(rtd1_ch2_last_ms), ${probe_stale_ms} * 3);

          // ── 1. Probe fault detection ────────────────────────────────────
          bool fault = p4_ctl_probe_fault(t, id(rtd1_ch1_last_ms), ${probe_stale_ms});
          id(ctl_probe_fault) = fault;

          // ── 2. Grace periods ────────────────────────────────────────────
          const uint32_t startup_grace_ms  = (uint32_t)(id(ctl_startup_grace_min)  * 60000.0f);
          const uint32_t defrost_grace_ms  = (uint32_t)(id(ctl_defrost_grace_min)  * 60000.0f);
          const uint32_t alarm_persist_ms  = (uint32_t)(id(ctl_alarm_persist_min)  * 60000.0f);
          bool in_grace = p4_ctl_startup_grace(id(ctl_boot_ms), startup_grace_ms) ||
                          p4_ctl_defrost_grace(id(ctl_defrost_last_end_ms), defrost_grace_ms);

          // ── 3. Sensor fallback duty cycle (when probe is faulted) ───────
          bool fallback_run = p4_ctl_fallback_should_run(
              fault, id(input_fallback_enabled),
              id(ctl_fallback_phase_on), id(ctl_fallback_last_toggle_ms),
              (uint32_t)(id(ctl_fallback_on_min)  * 60000.0f),
              (uint32_t)(id(ctl_fallback_off_min) * 60000.0f));
          if (fault) {
              id(ctl_sensor_fallback_active) = id(input_fallback_enabled);
              if (!id(relay_defrost).state) {
                  if (fallback_run && !id(relay_compressor).state) {
                      id(relay_compressor).turn_on();
                      id(ctl_comp_on_since_ms) = now_ms;
                  } else if (!fallback_run && id(relay_compressor).state) {
                      id(relay_compressor).turn_off();
                      id(ctl_comp_last_off_ms) = now_ms;
                      id(ctl_comp_on_since_ms) = 0;
                  }
              }
              // Drive siren for probe fault
              if (id(input_siren_enabled) && !id(relay_siren).state)
                  id(relay_siren).turn_on();
          } else {
              if (id(ctl_sensor_fallback_active)) {
                  id(ctl_sensor_fallback_active) = false;
                  id(ctl_fallback_last_toggle_ms) = 0;
              }
          }

          // ── 4. Compressor lockout (off-delay protection) ─────────────────
          const uint32_t lockout_ms = (uint32_t)(id(ctl_comp_lockout_min) * 60000.0f);
          bool locked_out = p4_ctl_comp_locked_out(id(ctl_comp_last_off_ms), lockout_ms);

          // ── 5. Defrost sequencing (skip if probe fault) ──────────────────
          if (!fault) {
              const uint32_t def_interval_ms  = (uint32_t)(id(ctl_defrost_interval_min) * 60000.0f);
              const uint32_t def_duration_ms  = (uint32_t)(id(ctl_defrost_duration_min) * 60000.0f);
              const uint32_t drip_ms          = (uint32_t)(id(ctl_defrost_drip_min)     * 60000.0f);

              if (id(ctl_defrost_dripping)) {
                  // Drip phase: keep compressor off until drip time elapsed
                  if (id(relay_compressor).state) {
                      id(relay_compressor).turn_off();
                      id(ctl_comp_last_off_ms) = now_ms;
                      id(ctl_comp_on_since_ms) = 0;
                  }
                  if ((now_ms - id(ctl_drip_start_ms)) >= drip_ms) {
                      id(ctl_defrost_dripping) = false;
                      ESP_LOGI("ctl", "Drip phase complete");
                  }
              } else if (id(relay_defrost).state) {
                  // Defrost running: keep compressor off, watch for end conditions
                  if (id(relay_compressor).state) {
                      id(relay_compressor).turn_off();
                      id(ctl_comp_last_off_ms) = now_ms;
                      id(ctl_comp_on_since_ms) = 0;
                  }
                  bool end_by_temp = evap_ok && id(input_defrost_term_temp_enabled) &&
                                     p4_ctl_defrost_term_by_temp(evap, id(ctl_defrost_end_c), true);
                  bool end_by_time = p4_ctl_defrost_timeout(id(ctl_defrost_on_since_ms), def_duration_ms);
                  if (end_by_temp || end_by_time) {
                      id(relay_defrost).turn_off();
                      id(ctl_defrost_last_end_ms) = now_ms;
                      p4_sd_log_event("DEFROST_END", end_by_temp ? "evap_temp" : "timeout");
                      if (id(input_defrost_drip_enabled) && drip_ms > 0) {
                          id(ctl_defrost_dripping) = true;
                          id(ctl_drip_start_ms) = now_ms;
                      }
                  }
              } else {
                  // Not defrosting: check if a cycle should start
                  bool manual_start = id(ctl_manual_defrost_req);
                  // Smart delta tracking
                  if (id(input_smart_defrost_enabled) && evap_ok) {
                      float delta = t - evap;
                      if (delta >= id(ctl_smart_delta_c) && id(relay_compressor).state) {
                          if (id(ctl_defrost_delta_since_ms) == 0)
                              id(ctl_defrost_delta_since_ms) = now_ms;
                      } else {
                          id(ctl_defrost_delta_since_ms) = 0;
                      }
                  }
                  bool smart_start = id(input_smart_defrost_enabled) &&
                      p4_ctl_smart_defrost_ready(t, evap,
                          id(ctl_smart_delta_c),
                          id(ctl_defrost_delta_since_ms),
                          (uint32_t)(id(ctl_smart_dwell_min) * 60000.0f),
                          id(ctl_comp_on_since_ms),
                          (uint32_t)(15UL * 60000UL),  // 15 min min comp run
                          false);
                  bool time_start = p4_ctl_defrost_due(id(ctl_defrost_last_end_ms), def_interval_ms);
                  if (manual_start || smart_start || time_start) {
                      id(ctl_manual_defrost_req) = false;
                      id(ctl_defrost_delta_since_ms) = 0;
                      if (id(relay_compressor).state) {
                          id(relay_compressor).turn_off();
                          id(ctl_comp_last_off_ms) = now_ms;
                          id(ctl_comp_on_since_ms) = 0;
                      }
                      id(relay_defrost).turn_on();
                      id(ctl_defrost_on_since_ms) = now_ms;
                      const char* reason = manual_start ? "manual" : (smart_start ? "smart_delta" : "interval");
                      ESP_LOGI("ctl", "Defrost started: %s", reason);
                      p4_sd_log_event("DEFROST_START", reason);
                  }

                  // ── 6. Compressor hysteresis (skip if defrost, dripping, locked out) ──
                  if (!locked_out) {
                      int cmd = p4_ctl_compressor_eval(
                          t, id(ctl_setpoint), id(ctl_comp_diff),
                          id(relay_compressor).state,
                          id(rtd1_ch1_last_ms), ${probe_stale_ms});
                      if (cmd == 1) {
                          id(relay_compressor).turn_on();
                          if (id(ctl_comp_on_since_ms) == 0) id(ctl_comp_on_since_ms) = now_ms;
                      }
                      if (cmd == -1) {
                          if (id(relay_compressor).state) {
                              id(relay_compressor).turn_off();
                              id(ctl_comp_last_off_ms) = now_ms;
                              id(ctl_comp_on_since_ms) = 0;
                          }
                      }
                  }
              }
          }

          // ── 7. Alarm evaluation (with grace + persist + hysteresis) ──────
          if (!fault && !in_grace) {
              bool raw_hi = p4_ctl_alarm_high(t, id(ctl_setpoint), id(ctl_alarm_high_delta));
              bool raw_lo = p4_ctl_alarm_low(t, id(ctl_setpoint), id(ctl_alarm_low_delta));
              // Persist tracking
              if (raw_hi && id(ctl_high_alarm_since_ms) == 0) id(ctl_high_alarm_since_ms) = now_ms;
              if (!raw_hi) id(ctl_high_alarm_since_ms) = 0;
              if (raw_lo && id(ctl_low_alarm_since_ms) == 0) id(ctl_low_alarm_since_ms) = now_ms;
              if (!raw_lo) id(ctl_low_alarm_since_ms) = 0;
              bool hi = raw_hi && p4_ctl_alarm_persisted(id(ctl_high_alarm_since_ms), alarm_persist_ms);
              bool lo = raw_lo && p4_ctl_alarm_persisted(id(ctl_low_alarm_since_ms), alarm_persist_ms);
              id(ctl_alarm_high_active) = hi;
              id(ctl_alarm_low_active)  = lo;
              // No-cool alarm
              bool nc = p4_ctl_no_cool_alarm(t, id(ctl_setpoint), id(ctl_comp_diff),
                                              id(relay_compressor).state, id(ctl_comp_on_since_ms),
                                              (uint32_t)(id(ctl_no_cool_alarm_min) * 60000.0f));
              id(ctl_no_cool_alarm_active) = nc;
              // Ice alarm (needs evap probe)
              bool ice = evap_ok && p4_ctl_ice_alarm(t, evap, id(ctl_ice_delta_c));
              id(ctl_ice_alarm_active) = ice;
              // Siren: any active alarm drives it
              bool any_alarm = hi || lo || nc || ice;
              if (id(input_siren_enabled)) {
                  if (any_alarm && !id(relay_siren).state) id(relay_siren).turn_on();
                  if (!any_alarm && id(relay_siren).state) id(relay_siren).turn_off();
              }
          } else if (!fault) {
              // In grace: clear alarm flags, silence siren
              id(ctl_alarm_high_active) = false;
              id(ctl_alarm_low_active)  = false;
              id(ctl_no_cool_alarm_active) = false;
              id(ctl_ice_alarm_active)  = false;
              if (id(relay_siren).state) id(relay_siren).turn_off();
          }

          // ── 8. SD temperature logging (Phase 5) ─────────────────────────
          const uint32_t log_every_ticks = (uint32_t)(${log_interval_min}) * 6U;
          id(log_tick_count) = id(log_tick_count) + 1U;
          if (id(sd_card_ok) && id(log_tick_count) >= log_every_ticks) {
              id(log_tick_count) = 0;
              p4_sd_log_temps(
                  id(probe1_temp).state, id(probe2_temp).state, id(probe3_temp).state,
                  id(ctl_setpoint), id(relay_compressor).state, id(relay_defrost).state,
                  id(ctl_alarm_high_active), id(ctl_alarm_low_active), id(ctl_probe_fault));
          }

          // ── 9. ntfy push notifications — edge-triggered (Phase 5) ───────
          bool ntfy_hi = id(ctl_alarm_high_active);
          bool ntfy_lo = id(ctl_alarm_low_active);
          bool ntfy_pf = id(ctl_probe_fault);
          if (ntfy_hi && !id(ntfy_alarm_hi_sent)) {
              id(ntfy_alarm_hi_sent) = true;
              id(ntfy_high_alarm_request).trigger();
              p4_sd_log_event("ALARM_HI", "");
          } else if (!ntfy_hi && id(ntfy_alarm_hi_sent)) {
              id(ntfy_alarm_hi_sent) = false;
              id(ntfy_alarm_clear_request).trigger();
              p4_sd_log_event("ALARM_HI_CLEAR", "");
          }
          if (ntfy_lo && !id(ntfy_alarm_lo_sent)) {
              id(ntfy_alarm_lo_sent) = true;
              id(ntfy_low_alarm_request).trigger();
              p4_sd_log_event("ALARM_LO", "");
          } else if (!ntfy_lo && id(ntfy_alarm_lo_sent)) {
              id(ntfy_alarm_lo_sent) = false;
              id(ntfy_alarm_clear_request).trigger();
              p4_sd_log_event("ALARM_LO_CLEAR", "");
          }
          if (ntfy_pf && !id(ntfy_probe_fault_sent)) {
              id(ntfy_probe_fault_sent) = true;
              id(ntfy_probe_fault_request).trigger();
              p4_sd_log_event("PROBE_FAULT", "");
          } else if (!ntfy_pf && id(ntfy_probe_fault_sent)) {
              id(ntfy_probe_fault_sent) = false;
              p4_sd_log_event("PROBE_FAULT_CLEAR", "");
          }

  # ── Phase 4: 1s LVGL display updates ─────────────────────────────────────
  - interval: 1s
    then:
      - lvgl.label.update:
          id: lbl_clock
          text: !lambda |-
            char buf[24];
            p4_fmt_time(buf, sizeof(buf));
            std::string s(buf);
            return s.size() > 8 ? s.substr(s.size()-8) : s;
      - lvgl.label.update:
          id: lbl_heap
          text: !lambda |-
            char buf[24];
            snprintf(buf, sizeof(buf), "Heap: %.0f KB", p4_free_heap_kb());
            return std::string(buf);
      - lvgl.led.update:
          id: led_rs485
          brightness: !lambda 'return (id(hw_rs485_relay_ok) && id(hw_rs485_rtd1_ok)) ? 100.0f : 0.0f;'
      - lvgl.led.update:
          id: led_rtc
          brightness: !lambda 'return id(hw_rtc_ok) ? 100.0f : 0.0f;'

##############################################################################
# Globals
##############################################################################

globals:
  # ── Control parameters (NVS-persistent) ───────────────────────────────────
  - id: ctl_setpoint
    type: float
    restore_value: yes
    initial_value: ${default_setpoint_c}

  - id: ctl_comp_diff
    type: float
    restore_value: yes
    initial_value: ${default_comp_diff_c}

  - id: ctl_alarm_high_delta
    type: float
    restore_value: yes
    initial_value: ${default_alarm_high_c}

  - id: ctl_alarm_low_delta
    type: float
    restore_value: yes
    initial_value: ${default_alarm_low_c}

  # ── Runtime state ─────────────────────────────────────────────────────────
  - id: ctl_boot_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_wifi_connected
    type: bool
    restore_value: no
    initial_value: "false"

  # ── RS485 health flags ─────────────────────────────────────────────────────
  - id: hw_rs485_relay_ok
    type: bool
    restore_value: no
    initial_value: "false"

  - id: hw_rs485_rtd1_ok
    type: bool
    restore_value: no
    initial_value: "false"

  - id: hw_rs485_rtd2_ok
    type: bool
    restore_value: no
    initial_value: "false"

  # ── RTC health flag ────────────────────────────────────────────────────────
  - id: hw_rtc_ok
    type: bool
    restore_value: no
    initial_value: "false"

  # ── RTD sample timestamps (millis() at last valid reading) ─────────────────
  - id: rtd1_ch1_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: rtd1_ch2_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: rtd2_ch1_last_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  # ── Probe enable flags (NVS-persistent) ───────────────────────────────────
  - id: input_probe2_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: input_probe3_enabled
    type: bool
    restore_value: yes
    initial_value: "true"
  # ── Phase 3: Control state ────────────────────────────────────────
  - id: ctl_probe_fault
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_alarm_high_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_alarm_low_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_defrost_on_since_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_defrost_last_end_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  # ── Phase 5: SD card state ─────────────────────────────────────────────
  - id: sd_card_ok
    type: bool
    restore_value: no
    initial_value: "false"

  # Alarm state tracking for ntfy edge detection (avoid repeat notifications)
  - id: ntfy_alarm_hi_sent
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ntfy_alarm_lo_sent
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ntfy_probe_fault_sent
    type: bool
    restore_value: no
    initial_value: "false"

  # Log tick counter (incremented every 10s, log when reaches interval)
  - id: log_tick_count
    type: uint32_t
    restore_value: no
    initial_value: "0"

  # ── Phase 6: Extended control state ────────────────────────────────────────
  # Configurable parameters (NVS-persistent)
  - id: ctl_comp_lockout_min
    type: float
    restore_value: yes
    initial_value: ${default_comp_lockout_min}

  - id: ctl_startup_grace_min
    type: float
    restore_value: no
    initial_value: ${default_startup_grace_min}

  - id: ctl_defrost_grace_min
    type: float
    restore_value: yes
    initial_value: ${default_defrost_grace_min}

  - id: ctl_defrost_interval_min
    type: float
    restore_value: yes
    initial_value: ${default_defrost_interval_min}

  - id: ctl_defrost_duration_min
    type: float
    restore_value: yes
    initial_value: ${default_defrost_duration_min}

  - id: ctl_defrost_drip_min
    type: float
    restore_value: yes
    initial_value: ${default_defrost_drip_min}

  - id: ctl_defrost_end_c
    type: float
    restore_value: yes
    initial_value: ${default_defrost_end_c}

  - id: ctl_alarm_persist_min
    type: float
    restore_value: yes
    initial_value: ${default_alarm_persist_min}

  - id: ctl_alarm_hysteresis_c
    type: float
    restore_value: yes
    initial_value: ${default_alarm_hysteresis_c}

  - id: ctl_door_alarm_delay_s
    type: float
    restore_value: yes
    initial_value: ${default_door_alarm_delay_s}

  - id: ctl_no_cool_alarm_min
    type: float
    restore_value: yes
    initial_value: ${default_no_cool_alarm_min}

  - id: ctl_ice_delta_c
    type: float
    restore_value: yes
    initial_value: ${default_ice_delta_c}

  - id: ctl_fallback_on_min
    type: float
    restore_value: yes
    initial_value: ${default_fallback_on_min}

  - id: ctl_fallback_off_min
    type: float
    restore_value: yes
    initial_value: ${default_fallback_off_min}

  - id: ctl_smart_delta_c
    type: float
    restore_value: yes
    initial_value: ${default_smart_delta_c}

  - id: ctl_smart_dwell_min
    type: float
    restore_value: yes
    initial_value: ${default_smart_dwell_min}

  # Runtime timestamps and state flags (non-persistent)
  - id: ctl_comp_last_off_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_comp_on_since_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_high_alarm_since_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_low_alarm_since_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_door_open_since_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_no_cool_alarm_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_ice_alarm_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_door_alarm_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_defrost_dripping
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_drip_start_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_manual_defrost_req
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_defrost_delta_since_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: ctl_sensor_fallback_active
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_fallback_phase_on
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ctl_fallback_last_toggle_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: input_door_sensor_enabled
    type: bool
    restore_value: yes
    initial_value: "false"

  - id: input_siren_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: input_defrost_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: input_fallback_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: input_defrost_term_temp_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: input_defrost_drip_enabled
    type: bool
    restore_value: yes
    initial_value: "true"

  - id: input_smart_defrost_enabled
    type: bool
    restore_value: yes
    initial_value: "false"

##############################################################################
# Phase 4: LDO — MIPI-DSI D-PHY power rail
# Channel 3 at 2.5V is the standard ESP32-P4 MIPI-DSI configuration.
# Confirmed: ESP_LDO_VO3 net present in board schematic.
##############################################################################

esp_ldo:
  - id: ldo_mipi_dphy
    channel: 3
    voltage: 2.5V

##############################################################################
# Phase 4: MIPI-DSI Display — 7" 1024×600 JD9365, 2-lane DSI
# Model matches exactly. Reset pin GPIO33 confirmed from schematic.
##############################################################################

display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B
    update_interval: never
    auto_clear_enabled: false
    on_page_change:
      - lambda: 'ESP_LOGD("lvgl", "display page changed");'

##############################################################################
# Phase 4: GT911 Capacitive Touchscreen
# Shares i2c_bus (GPIO 7/8). INT GPIO23, RST GPIO33 from schematic.
##############################################################################

touchscreen:
  - platform: gt911
    id: touch_panel
    i2c_id: i2c_bus
    address: 0x5D
    interrupt_pin:
      number: ${touch_int_pin}
      mode:
        input: true
    # reset_pin omitted: GPIO33 is owned by the mipi_dsi model (shared LCD+touch reset line)

##############################################################################
# Phase 4: Backlight output
##############################################################################

output:
  - platform: ledc
    id: backlight_pwm
    pin: ${display_bl_pin}
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 500ms
    web_server:
      sorting_group_id: group_system_info
      sorting_weight: 20

##############################################################################
# Phase 4: Fonts for LVGL
##############################################################################

font:
  - file: "gfonts://Roboto"
    id: font_huge
    size: 64
    glyphs: "0123456789.-+NA "
  - file: "gfonts://Roboto"
    id: font_large
    size: 28
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-: /%"
  - file: "gfonts://Roboto"
    id: font_medium
    size: 20
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-: /%+"
  - file: "gfonts://Roboto"
    id: font_small
    size: 15
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-: /%+"

##############################################################################
# Phase 4: LVGL Coolroom Dashboard
##############################################################################

color:
  - id: col_bg         # Dark background
    hex: "1C1C1E"
  - id: col_panel      # Card surface
    hex: "2C2C2E"
  - id: col_green      # Compressor ON / good status
    hex: "30D158"
  - id: col_blue       # Defrost
    hex: "0A84FF"
  - id: col_red        # Alarm
    hex: "FF453A"
  - id: col_orange     # Probe fault / warning
    hex: "FF9F0A"
  - id: col_text       # Primary text
    hex: "FFFFFF"
  - id: col_subtext    # Secondary text
    hex: "8E8E93"

lvgl:
  displays:
    - main_display
  touchscreens:
    - touch_panel
  color_depth: 16
  bg_color: col_bg
  text_color: col_text
  log_level: WARN
  default_font: font_small

  pages:
    - id: page_main
      bg_color: col_bg
      widgets:

        # ── Top header ─────────────────────────────────────────────────────
        - obj:
            x: 0
            y: 0
            width: 1024
            height: 48
            bg_color: col_panel
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
                  x: 16
                  y: 14
                  text: "Coolroom Controller"
                  text_font: font_medium
                  text_color: col_text
              - label:
                  id: lbl_clock
                  align: RIGHT_MID
                  x: -16
                  text: "--:--:--"
                  text_font: font_small
                  text_color: col_subtext

        # ── Main temperature card (left) ────────────────────────────────────
        - obj:
            x: 8
            y: 56
            width: 400
            height: 240
            bg_color: col_panel
            radius: 12
            border_width: 0
            widgets:
              - label:
                  x: 16
                  y: 12
                  text: "COOLROOM"
                  text_font: font_small
                  text_color: col_subtext
              - label:
                  id: lbl_coolroom_temp
                  align: CENTER
                  y: 10
                  text: "---"
                  text_font: font_huge
                  text_color: col_green
              - label:
                  id: lbl_setpoint_display
                  align: BOTTOM_MID
                  y: -14
                  text: "SP: 2.0°C"
                  text_font: font_small
                  text_color: col_subtext

        # ── Setpoint control card ───────────────────────────────────────────
        - obj:
            x: 416
            y: 56
            width: 200
            height: 116
            bg_color: col_panel
            radius: 12
            border_width: 0
            widgets:
              - label:
                  x: 12
                  y: 10
                  text: "SETPOINT"
                  text_font: font_small
                  text_color: col_subtext
              - label:
                  id: lbl_setpoint_val
                  x: 12
                  y: 34
                  text: "2.0°C"
                  text_font: font_large
                  text_color: col_text
              - button:
                  id: btn_sp_up
                  align: RIGHT_MID
                  x: -10
                  y: 10
                  width: 44
                  height: 44
                  bg_color: col_blue
                  radius: 8
                  border_width: 0
                  widgets:
                    - label:
                        align: CENTER
                        text: "▲"
                        text_font: font_small
                  on_click:
                    - number.increment:
                        id: setpoint
                        cycle: false
              - button:
                  id: btn_sp_dn
                  align: RIGHT_MID
                  x: -10
                  y: -10
                  width: 44
                  height: 44
                  bg_color: col_blue
                  radius: 8
                  border_width: 0
                  widgets:
                    - label:
                        align: CENTER
                        text: "▼"
                        text_font: font_small
                  on_click:
                    - number.decrement:
                        id: setpoint
                        cycle: false

        # ── Secondary probes card ───────────────────────────────────────────
        - obj:
            x: 624
            y: 56
            width: 392
            height: 116
            bg_color: col_panel
            radius: 12
            border_width: 0
            widgets:
              - label:
                  x: 16
                  y: 10
                  text: "EVAPORATOR"
                  text_font: font_small
                  text_color: col_subtext
              - label:
                  id: lbl_evap_temp
                  x: 16
                  y: 32
                  text: "---"
                  text_font: font_large
                  text_color: col_text
              - label:
                  x: 210
                  y: 10
                  text: "AMBIENT"
                  text_font: font_small
                  text_color: col_subtext
              - label:
                  id: lbl_ambient_temp
                  x: 210
                  y: 32
                  text: "---"
                  text_font: font_large
                  text_color: col_text

        # ── Status card ─────────────────────────────────────────────────────
        - obj:
            x: 416
            y: 180
            width: 600
            height: 116
            bg_color: col_panel
            radius: 12
            border_width: 0
            widgets:
              # Compressor
              - led:
                  id: led_compressor
                  x: 16
                  y: 24
                  width: 14
                  height: 14
                  color: col_green
                  brightness: 0%
              - label:
                  x: 36
                  y: 18
                  text: "Compressor"
                  text_font: font_small
                  text_color: col_text
              # Defrost
              - led:
                  id: led_defrost
                  x: 130
                  y: 24
                  width: 14
                  height: 14
                  color: col_blue
                  brightness: 0%
              - label:
                  x: 150
                  y: 18
                  text: "Defrost"
