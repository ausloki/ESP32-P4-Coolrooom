## Copy this file to secrets.yaml and fill in your values.
## secrets.yaml is git-ignored and must never be committed.

# Primary WiFi network (used when device can connect)
wifi_ssid: "YOUR_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# Fallback AP credentials (used when no primary network found)
# Connect to this AP then navigate to 192.168.4.1 to configure WiFi
ap_password: "YOUR_AP_PASSWORD"

# OTA update password
ota_password: "YOUR_OTA_PASSWORD"

# ESPHome Native API encryption key (generate with: python3 -c "import base64,os; print(base64.b64encode(os.urandom(32)).decode())")
api_encryption_key: "YOUR_API_ENCRYPTION_KEY"

# Web server credentials
web_server_username: "admin"
web_server_password: "YOUR_WEB_PASSWORD"

# ntfy.sh push notifications (optional)
# ntfy_topic: "your-coolroom-topic"
